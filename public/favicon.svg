<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- New Gradient: Cyan to Blue -->
    <linearGradient id="z-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" /> <!-- Cyan -->
      <stop offset="100%" stop-color="#3B82F6" /> <!-- Blue -->
    </linearGradient>
  </defs>
  
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.15"/>
  </filter>

  <path d="M20,20 h60 v15 l-35,30 h35 v15 h-60 v-15 l35,-30 h-35 z" 
        fill="url(#z-gradient)" 
        filter="url(#shadow)"/>
</svg>
